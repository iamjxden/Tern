name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes (optional)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Disable Flutter analytics
        run: flutter config --no-analytics

      - name: Install dependencies
        run: flutter pub get

      - name: Extract version
        id: version
        run: |
          FULL=$(grep '^version:' pubspec.yaml | awk '{print $2}' | tr -d '\r')
          VERSION=$(echo "$FULL" | cut -d'+' -f1)
          BUILD=$(echo "$FULL" | cut -d'+' -f2)
          SHORT_SHA=${GITHUB_SHA::7}
          TAG="v${VERSION}+${BUILD}-${SHORT_SHA}"
          echo "full=$FULL"         >> $GITHUB_OUTPUT
          echo "version=$VERSION"   >> $GITHUB_OUTPUT
          echo "build=$BUILD"       >> $GITHUB_OUTPUT
          echo "tag=$TAG"           >> $GITHUB_OUTPUT
          echo "release_name=Tern v${VERSION} (build ${BUILD})" >> $GITHUB_OUTPUT

      - name: Setup keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
            cat > android/key.properties << PROPS
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=keystore.jks
          PROPS
            echo "Using release keystore"
          else
            keytool -genkeypair -v \
              -keystore android/app/keystore.jks \
              -alias tern \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass ternpass \
              -keypass ternpass \
              -dname "CN=Tern,O=Aetheron,C=US" 2>/dev/null
            cat > android/key.properties << PROPS
          storePassword=ternpass
          keyPassword=ternpass
          keyAlias=tern
          storeFile=keystore.jks
          PROPS
            echo "Generated temporary keystore"
          fi

      - name: Print SHA-1
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            keytool -list -v -keystore android/app/keystore.jks \
              -alias "${{ secrets.KEY_ALIAS }}" \
              -storepass "${{ secrets.STORE_PASSWORD }}" 2>/dev/null | grep "SHA1:"
          else
            keytool -list -v -keystore android/app/keystore.jks \
              -alias tern \
              -storepass ternpass 2>/dev/null | grep "SHA1:"
          fi

      - name: Build release APK
        run: flutter build apk --release --dart-define=FLAVOR=production

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/tern-${{ steps.version.outputs.tag }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tern-APK-${{ steps.version.outputs.tag }}
          path: build/app/outputs/flutter-apk/tern-${{ steps.version.outputs.tag }}.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.release_name }}
          draft: false
          prerelease: false
          make_latest: true
          body: |
            ## ${{ steps.version.outputs.release_name }}

            ${{ github.event.inputs.release_notes || github.event.head_commit.message }}

            ---

            ### Install
            1. Download **tern-${{ steps.version.outputs.tag }}.apk** from Assets below
            2. On your Android device: Settings → Security → enable **Install from unknown sources**
            3. Open the downloaded APK and install

            ### Requirements
            - Android 7.0+ (minSdk 24)
            - Ollama reachable on your network or device

            ---
            Commit: `${{ github.sha }}`
          files: build/app/outputs/flutter-apk/tern-${{ steps.version.outputs.tag }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
