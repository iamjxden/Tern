name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes (optional)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Disable Flutter analytics
        run: flutter config --no-analytics

      - name: Install dependencies
        run: flutter pub get

      - name: Extract version
        id: version
        run: |
          # e.g. "1.0.0+1"
          FULL=$(grep '^version:' pubspec.yaml | awk '{print $2}' | tr -d '\r')
          VERSION=$(echo "$FULL" | cut -d'+' -f1)
          BUILD=$(echo "$FULL" | cut -d'+' -f2)
          SHORT_SHA=${GITHUB_SHA::7}
          TAG="v${VERSION}+${BUILD}-${SHORT_SHA}"
          echo "full=$FULL"         >> $GITHUB_OUTPUT
          echo "version=$VERSION"   >> $GITHUB_OUTPUT
          echo "build=$BUILD"       >> $GITHUB_OUTPUT
          echo "tag=$TAG"           >> $GITHUB_OUTPUT
          echo "release_name=Tern v${VERSION} (build ${BUILD})" >> $GITHUB_OUTPUT

      # ── Optional: decode keystore from secret ─────────────────────────────
      # Set KEYSTORE_BASE64, KEY_ALIAS, KEY_PASSWORD, STORE_PASSWORD in
      # GitHub Secrets to produce a signed APK. Without these secrets the
      # build falls back to a debug-signed APK that can still be sideloaded.
      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks

      - name: Create key.properties
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > android/key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=keystore.jks
          EOF

      - name: Build release APK
        run: flutter build apk --release --dart-define=FLAVOR=production

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/tern-${{ steps.version.outputs.tag }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tern-APK-${{ steps.version.outputs.tag }}
          path: build/app/outputs/flutter-apk/tern-${{ steps.version.outputs.tag }}.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.release_name }}
          draft: false
          prerelease: false
          make_latest: true
          body: |
            ## ${{ steps.version.outputs.release_name }}

            ${{ github.event.inputs.release_notes || github.event.head_commit.message }}

            ---

            ### Install
            1. Download **tern-${{ steps.version.outputs.tag }}.apk** from Assets below
            2. On your Android device: Settings → Security → enable **Install from unknown sources**
            3. Open the downloaded APK and install

            ### What's in Tern
            - Agentic chat powered by local Ollama models
            - 11 built-in tools (web search, notes, memory, bash, …)
            - Conversation history synced via Tern backend
            - Projects with system prompts and knowledge base
            - Notes — full create / edit / delete
            - Sign-in via Email OTP or Google
            - Dark theme · 5 localisations

            ### Requirements
            - Android 7.0+ (minSdk 24)
            - Ollama reachable on your network or device

            ---
            Commit: `${{ github.sha }}`
          files: build/app/outputs/flutter-apk/tern-${{ steps.version.outputs.tag }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
