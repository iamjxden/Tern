name: Version Bump

# Run manually to bump the version in pubspec.yaml,
# commit it, and push — which then triggers build-apk.yml automatically.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version part to bump'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major]
      custom_version:
        description: 'Or set an exact version (e.g. 2.1.0) — overrides bump'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  bump:
    name: Bump version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute new version
        id: ver
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | awk '{print $2}' | tr -d '\r')
          VERSION=$(echo "$CURRENT" | cut -d'+' -f1)
          BUILD=$(echo "$CURRENT" | cut -d'+' -f2)
          NEW_BUILD=$((BUILD + 1))

          if [ -n "${{ github.event.inputs.custom_version }}" ]; then
            NEW_VERSION="${{ github.event.inputs.custom_version }}"
          else
            MAJOR=$(echo "$VERSION" | cut -d'.' -f1)
            MINOR=$(echo "$VERSION" | cut -d'.' -f2)
            PATCH=$(echo "$VERSION" | cut -d'.' -f3)
            case "${{ github.event.inputs.bump }}" in
              major) NEW_VERSION="$((MAJOR+1)).0.0" ;;
              minor) NEW_VERSION="${MAJOR}.$((MINOR+1)).0" ;;
              patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH+1))" ;;
            esac
          fi

          echo "old=${CURRENT}"                        >> $GITHUB_OUTPUT
          echo "new=${NEW_VERSION}+${NEW_BUILD}"       >> $GITHUB_OUTPUT
          echo "version=${NEW_VERSION}"                >> $GITHUB_OUTPUT
          echo "build=${NEW_BUILD}"                    >> $GITHUB_OUTPUT

      - name: Update pubspec.yaml
        run: |
          sed -i "s/^version: .*/version: ${{ steps.ver.outputs.new }}/" pubspec.yaml
          echo "Bumped: ${{ steps.ver.outputs.old }} → ${{ steps.ver.outputs.new }}"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: bump version to ${{ steps.ver.outputs.new }} [skip ci]"
          git tag "v${{ steps.ver.outputs.version }}"
          git push origin HEAD
          git push origin "v${{ steps.ver.outputs.version }}"
